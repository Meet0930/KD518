databases:
  - name: roommate-tracker-db
    databaseName: roommate_tracker
    user: roommate_tracker_user
    plan: free

services:
  - type: web
    name: roommate-tracker-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && (python manage.py createsuperuser --noinput || true)
    startCommand: gunicorn roommate_tracker.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: roommate-tracker-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        value: "Admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "ChangeThisAdminPassword123!"
