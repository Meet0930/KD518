{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card card-soft border-danger">
      <div class="card-body">
        <h3 class="text-danger mb-2">Delete User</h3>
        <p>Are you sure you want to delete user <strong>{{ edit_user.username }}</strong>?</p>
        <p class="help-text">This action cannot be undone.</p>
        <form method="post">
          {% csrf_token %}
          <button class="btn btn-danger" type="submit">Yes, Delete</button>
          <a class="btn btn-secondary" href="{% url 'water:admin_users' %}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
