{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card card-soft border-danger">
      <div class="card-body">
        <h3 class="text-danger mb-2">Delete Bottle Entry</h3>
        <p>
          Are you sure you want to delete this entry?
          <br>
          <strong>{{ entry.roommate.name }}</strong> - {{ entry.quantity }} bottle(s) - {{ entry.filled_at|date:"Y-m-d H:i" }}
        </p>
        <p class="help-text">This action cannot be undone.</p>
        <form method="post">
          {% csrf_token %}
          <button class="btn btn-danger" type="submit">Yes, Delete</button>
          <a class="btn btn-secondary" href="{% url 'water:admin_fills' %}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
