{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="mb-0">Admin – Reminder Settings</h3>
    <div class="text-muted small">Change how often reminders run.</div>
  </div>
  <a class="btn btn-outline-secondary btn-sm" href="{% url 'water:admin_panel' %}">Back</a>
</div>

<div class="card card-soft">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Save</button>
    </form>
  </div>
</div>
{% endblock %}
