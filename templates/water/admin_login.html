{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card card-soft">
      <div class="card-body p-4">
        <h3>Admin Login</h3>
        <p class="help-text mb-3">This login is only for admin/staff users.</p>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary w-100" type="submit">Login</button>
        </form>
        <div class="mt-3 small text-muted">
          Admin panel URL: <code>/panel/</code>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
